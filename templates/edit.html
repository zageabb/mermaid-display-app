<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modify: {{ filename }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        .editor-container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: #2c3e50; }
        .back-btn { text-decoration: none; color: #333; background: #e0e0e0; padding: 8px 14px; border-radius: 4px; }
        
        textarea { width: 100%; height: 450px; font-family: 'Courier New', Courier, monospace; font-size: 14px; padding: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #2d3748; color: #f7fafc; line-height: 1.5; }
        .actions { margin-top: 20px; display: flex; justify-content: flex-end; }
        .save-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;}
        .save-btn:hover { background: #219653; }
    </style>
</head>
<body>
    <div class="editor-container">
        <header>
            <h2>Modifying Code Source: <code>{{ filename }}</code></h2>
            <a href="{{ url_for('index') }}" class="back-btn">Cancel / Dashboard</a>
        </header>

        <form method="POST">
            <textarea name="code" spellcheck="false">{{ content }}</textarea>
            <div class="actions">
                <button type="submit" class="save-btn">💾 Commit Updates</button>
            </div>
        </form>
    </div>
</body>
</html>
